# This is a basic workflow to help you get started with Actions

name: CI - DevMatch Backend

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events for all branches
  push:
  pull_request:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Use the latest action versions that run on Node.js 24
    # (actions/checkout@v6 and actions/setup-node@v6 are Node.js 24 compatible)
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js (Active LTS)
        uses: actions/setup-node@v6
        with:
          node-version: 24.13.1
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security Audit
        run: npm audit --audit-level=high

      #- name: Validate Prisma Schema
      #  run: npx prisma validate

      - name: Run Lint
        run: npm run lint
        continue-on-error: true

      - name: Build Application
        run: npm run build

      - name: Run Unit Tests
        run: npm test
